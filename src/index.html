<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eFood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="header" id="main-header">
    <div class="container header__content">
      <div class="header__top">
        <nav class="header__nav">
          <a href="#" class="header__link header__link--home">Restaurantes</a>
        </nav>
        <div class="header__logo">
          <a href="/" class="logo-link">
            <img src="assets/logo.svg" alt="efood" class="logo-img" />
          </a>
        </div>
        <div class="header__cart">
          <button class="header__link" id="cart-button">
            0 produto(s) no carrinho
            <svg class="cart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;">
              <path d="M7 18C5.9 18 5.01 18.9 5.01 20C5.01 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5.48C20.96 5.34 21 5.17 21 5C21 4.45 20.55 4 20 4H5.21L4.27 2H1ZM17 18C15.9 18 15.01 18.9 15.01 20C15.01 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18Z" fill="currentColor"/>
            </svg>
          </button>
        </div>


      </div>
      <p class="header__slogan">Viva experiências gastronômicas no conforto da sua casa</p>
    </div>



  </header>



  <main id="main-content">
    <section id="restaurantes" class="restaurantes">
      <div class="container"></div>
    </section>

    <section id="restaurante-detalhes" class="restaurante-detalhes" style="display:none;">
      <div class="detalhes-header">
        <div class="container">
          <span class="detalhes__subtipo"></span>
          <h2 class="detalhes__titulo"></h2>
        </div>
      </div>
      <div class="container">
        <div class="cardapio-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__logo">
        <a href="/" class="logo-link">
          <img src="assets/logo.svg" alt="efood" class="logo-img" />
        </a>
      </div>

      <div class="footer__social">
        <a href="#" aria-label="Instagram">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" /></svg>
        </a>
        <a href="#" aria-label="Facebook">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" /></svg>
        </a>
        <a href="#" aria-label="Twitter">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" /></svg>
        </a>
      </div>
      <p class="footer__copy">A efood é uma plataforma para divulgação de estabelecimentos, a responsabilidade pela entrega, qualidade dos produtos é toda do estabelecimento contratado.</p>
    </div>
  </footer>

  <template id="restaurante-card">
    <article class="restaurante-card">
      <img class="restaurante-card__img" alt="">
      <div class="restaurante-card__badges">
        <span class="badge badge--destaque">Destaque</span>
        <span class="badge badge--tipo"></span>
      </div>
      <div class="restaurante-card__body">
        <div class="restaurante-card__header">
          <h3 class="restaurante-card__nome"></h3>
          <span class="restaurante-card__rating">
            <span class="restaurante-card__stars">★</span>
            <span class="restaurante-card__nota"></span>
          </span>
        </div>
        <p class="restaurante-card__descricao"></p>
        <button class="btn btn--primary restaurante-card__btn" data-id="">Saiba mais</button>
      </div>
    </article>
  </template>

  <template id="prato-card">
    <article class="prato-card">
      <img class="prato-card__img" alt="">
      <div class="prato-card__body">
        <h3 class="prato-card__nome"></h3>
        <p class="prato-card__descricao"></p>
        <p class="prato-card__porcao"></p>
        <button class="btn btn--primary prato-card__btn"></button>
      </div>
    </article>
  </template>

  <div class="modal-overlay" id="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-nome">
    <div class="modal" id="modal">
      <button class="modal__close" id="modal-close" aria-label="Fechar">&times;</button>
      <img class="modal__img" alt="">
      <div class="modal__body">
        <h2 class="modal__nome" id="modal-nome"></h2>
        <p class="modal__descricao"></p>
        <p class="modal__porcao"></p>
        <button class="btn btn--primary modal__btn">Adicionar ao carrinho - <span class="modal__preco"></span></button>
      </div>
    </div>
  </div>

  <div class="carrinho-overlay" id="carrinho-overlay" style="display:none;">
    <aside class="carrinho-sidebar">
      <div class="carrinho-content">
        <ul class="carrinho-lista" id="carrinho-lista"></ul>
        <div class="carrinho-vazio" id="carrinho-vazio">Seu carrinho está vazio</div>
        <div class="carrinho-footer" id="carrinho-footer" style="display:none;">
          <div class="carrinho-total">
            <span>Valor total</span>
            <span id="carrinho-total-valor">R$ 0,00</span>
          </div>
          <button class="btn btn--primary carrinho-finalizar">Continuar com a entrega</button>
        </div>
      </div>
    </aside>
  </div>


  <script type="module" src="scripts/main.js"></script>
</body>
</html>
